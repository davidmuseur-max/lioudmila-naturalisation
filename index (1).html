<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>

<title>Pour Lioudmila — Préparation Naturalisation 🇫🇷</title>
<meta name="description" content="Application d'entraînement à la naturalisation française"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇫🇷</text></svg>"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; background: #F8FAFC; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  @keyframes ping { 75%,100% { transform:scale(2); opacity:0; } }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useCallback, useRef } = React;

// ── API Claude ──
async function callClaude(prompt, sys) {
  const system = sys || "Tu es un agent de préfecture bienveillant qui aide Lioudmila (russe) à préparer son entretien de naturalisation. Réponds en français, 3 phrases max, ton encourageant.";
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key": window.ANTHROPIC_KEY || "",
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-calls":"true"
      },
      body: JSON.stringify({ model:"claude-haiku-4-5", max_tokens:400, system, messages:[{role:"user",content:prompt}] })
    });
    if (!r.ok) return "Assistant momentanément indisponible.";
    const d = await r.json();
    return d.content?.[0]?.text || "Erreur.";
  } catch { return "Assistant momentanément indisponible."; }
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR'; u.rate = 0.85; u.pitch = 1.05;
  const voices = window.speechSynthesis.getVoices();
  const fr = voices.find(v => v.lang.startsWith('fr'));
  if (fr) u.voice = fr;
  window.speechSynthesis.speak(u);
}

// ── Données ──
const QS = [
  {id:1,cat:"Valeurs",q:"Quelle est la devise de la République française ?",a:"Liberté, Égalité, Fraternité.",fakes:["Justice, Solidarité, Unité.","Honneur, Patrie, Valeur."],n:"Vivre libre, tous égaux et solidaires.",rq:"Каков девиз Французской Республики?",ra:"Свобода, Равенство, Братство.",rn:"Жить свободным, равным и солидарным.",det:"Inscrite sur toutes les mairies, c'est le fondement de la vie en France.",img:"https://images.unsplash.com/photo-1499856871958-5b9627545d1a?auto=format&fit=crop&w=800&q=80"},
  {id:2,cat:"Laïcité",q:"Que signifie le principe de Laïcité ?",a:"La séparation des Églises et de l'État.",fakes:["L'interdiction de toute religion.","L'obligation d'être catholique."],n:"L'État est neutre. La religion est une affaire personnelle.",rq:"Что означает принцип лаицизма?",ra:"Разделение церквей и государства.",rn:"Государство нейтрально. Религия личное дело.",det:"Votée en 1905, l'État ne favorise aucune religion.",img:"https://images.unsplash.com/photo-1543783232-0a440939c63c?auto=format&fit=crop&w=800&q=80"},
  {id:3,cat:"Symboles",q:"Qui est Marianne ?",a:"L'allégorie de la République française.",fakes:["La première femme présidente.","Une sainte catholique protectrice."],n:"La femme qui représente la France. Son buste est dans les mairies.",rq:"Кто такая Марианна?",ra:"Аллегория Французской Республики.",rn:"Женщина, олицетворяющая Францию.",det:"Elle porte un bonnet phrygien, symbole des esclaves libérés.",img:"https://images.unsplash.com/photo-1604005953049-7e53f1d7a8d5?auto=format&fit=crop&w=800&q=80"},
  {id:4,cat:"Histoire",q:"En quelle année a débuté la Révolution française ?",a:"En 1789.",fakes:["En 1815.","En 1848."],n:"1789 : le peuple a pris la Bastille.",rq:"В каком году началась Французская революция?",ra:"В 1789 году.",rn:"В 1789 году народ взял Бастилию.",det:"Fin de la monarchie absolue, début de la République.",img:"https://images.unsplash.com/photo-1584027410058-297ce20ec888?auto=format&fit=crop&w=800&q=80"},
  {id:5,cat:"Institutions",q:"Qui vote les lois en France ?",a:"Le Parlement (Assemblée nationale et Sénat).",fakes:["Le Président seul.","Le Conseil d'État."],n:"Les députés et sénateurs décident des lois pour nous.",rq:"Кто принимает законы?",ra:"Парламент (Национальное собрание и Сенат).",rn:"Депутаты и сенаторы решают законы.",det:"Le peuple élit des représentants : c'est la démocratie.",img:"https://images.unsplash.com/photo-1541599540903-216a46ca1dc0?auto=format&fit=crop&w=800&q=80"},
  {id:6,cat:"Symboles",q:"De quelles couleurs est le drapeau français ?",a:"Bleu, Blanc, Rouge.",fakes:["Rouge, Or, Vert.","Bleu, Blanc, Vert."],n:"Le tricolore, symbole de la Révolution.",rq:"Какие цвета флага Франции?",ra:"Синий, Белый, Красный.",rn:"Триколор — символ Революции.",det:"Bleu et rouge pour Paris, blanc pour le roi.",img:"https://images.unsplash.com/photo-1551415923-a2297c7fda79?auto=format&fit=crop&w=800&q=80"},
  {id:7,cat:"Valeurs",q:"Quel est le principe fondamental de la démocratie française ?",a:"La souveraineté appartient au peuple.",fakes:["Le président détient tous les pouvoirs.","L'armée garantit l'ordre."],n:"C'est le peuple qui est le maître.",rq:"Каков основной принцип демократии?",ra:"Суверенитет принадлежит народу.",rn:"Народ — главный.",det:"Article 3 de la Constitution de 1958.",img:"https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?auto=format&fit=crop&w=800&q=80"},
  {id:8,cat:"Histoire",q:"Quel est l'hymne national français ?",a:"La Marseillaise.",fakes:["La Brabançonne.","Le Chant du Départ."],n:"La Marseillaise, écrite en 1792.",rq:"Каков национальный гимн Франции?",ra:"Марсельеза.",rn:"Марсельеза, 1792 год.",det:"Composée par Rouget de Lisle, hymne national depuis 1795.",img:"https://images.unsplash.com/photo-1560440021-33f9b867899d?auto=format&fit=crop&w=800&q=80"}
];

const MARSEILLAISE = [
  {line:"Allons enfants de la Patrie,",sub:"Appel à tous les citoyens"},
  {line:"Le jour de gloire est arrivé !",sub:"Le grand jour de la liberté"},
  {line:"Contre nous de la tyrannie,",sub:"Face à l'injustice"},
  {line:"L'étendard sanglant est levé,",sub:"Le drapeau de la résistance"},
  {line:"Aux armes, citoyens,",sub:"Prenez vos défenses"},
  {line:"Formez vos bataillons,",sub:"Unissez-vous ensemble"},
  {line:"Marchons, marchons !",sub:"Avançons avec courage"},
  {line:"Qu'un sang impur abreuve nos sillons !",sub:"Que la liberté triomphe"}
];

function shuffle(arr, seed) {
  const s=[...arr]; let r=seed||Date.now();
  for(let i=s.length-1;i>0;i--){r=(r*1664525+1013904223)&0xffffffff;const j=Math.abs(r)%(i+1);[s[i],s[j]]=[s[j],s[i]];}
  return s;
}

// ── Icônes Lucide ──
const Icon = ({name, size=20, className=""}) => {
  const el = lucide[name] || lucide['HelpCircle'];
  return React.createElement(el, {size, className});
};

// ── APP ──
function App() {
  const [view,setView]     = useState('home');
  const [showRu,setShowRu] = useState(false);
  const [search,setSearch] = useState('');
  const [aiExpand,setAiExpand] = useState({});
  const [quizOrder,setQuizOrder] = useState([]);
  const [qIdx,setQIdx]    = useState(0);
  const [score,setScore]  = useState(0);
  const [saved,setSaved]  = useState(null);
  const [answered,setAnswered] = useState(false);
  const [auto,setAuto]    = useState(true);
  const [selected,setSelected] = useState(null);
  const [timer,setTimer]  = useState(30);
  const [memo,setMemo]    = useState('');
  const [memoLoading,setMemoLoading] = useState(false);
  const [chat,setChat]    = useState([]);
  const [input,setInput]  = useState('');
  const [chatLoading,setChatLoading] = useState(false);
  const chatEndRef = useRef(null);
  const [apiKey,setApiKey] = useState('');
  const [showKeyModal,setShowKeyModal] = useState(false);

  useEffect(()=>{
    try {
      const s=localStorage.getItem('lm_quiz_v4'); if(s) setSaved(JSON.parse(s));
      const c=localStorage.getItem('lm_chat_v4'); if(c) setChat(JSON.parse(c));
      const k=localStorage.getItem('lm_api_key'); if(k){ setApiKey(k); window.ANTHROPIC_KEY=k; }
    } catch{}
  },[]);

  useEffect(()=>{
    try{ localStorage.setItem('lm_chat_v4',JSON.stringify(chat)); }catch{}
    chatEndRef.current?.scrollIntoView({behavior:'smooth'});
  },[chat]);

  const saveKey=(k)=>{ setApiKey(k); window.ANTHROPIC_KEY=k; localStorage.setItem('lm_api_key',k); setShowKeyModal(false); };

  const filtered = useMemo(()=>{
    const t=search.toLowerCase();
    return QS.filter(q=>q.q.toLowerCase().includes(t)||q.a.toLowerCase().includes(t)||q.cat.toLowerCase().includes(t));
  },[search]);

  const explainItem = async(id,q,a)=>{
    setAiExpand(p=>({...p,[id]:'loading'}));
    const r = await callClaude(`Explique en 3 phrases simples pourquoi "${q}" est important en France. Réponse correcte : "${a}".`);
    setAiExpand(p=>({...p,[id]:r}));
  };

  const startSim = ()=>{
    setView('sim');
    if(chat.length===0){
      const m="Bonjour Lioudmila ! Je suis l'agent de préfecture. Pourriez-vous vous présenter brièvement ?";
      setChat([{role:'ai',text:m}]);
      setTimeout(()=>speak(m),300);
    }
  };

  const sendChat = async(e)=>{
    e.preventDefault();
    if(!input.trim()||chatLoading) return;
    const msgs=[...chat,{role:'user',text:input.trim()}];
    setChat(msgs); setInput(''); setChatLoading(true);
    const ctx=msgs.map(m=>`${m.role==='ai'?'Agent':'Lioudmila'}: ${m.text}`).join('\n');
    const r=await callClaude(`${ctx}\n\nAgent: (2-3 phrases encourageantes, puis pose une question sur la France.)`);
    setChat(p=>[...p,{role:'ai',text:r}]); setChatLoading(false); speak(r);
  };

  const cq = quizOrder.length>0 ? QS[quizOrder[qIdx]] : null;
  const opts = useMemo(()=>cq?shuffle([cq.a,...cq.fakes],cq.id*37+qIdx):[],[cq,qIdx]);

  const startQuiz=(resume=false)=>{
    if(resume&&saved){setQuizOrder(saved.order);setQIdx(saved.idx);setScore(saved.score);}
    else{const o=shuffle(QS.map((_,i)=>i),Date.now());setQuizOrder(o);setQIdx(0);setScore(0);}
    setAnswered(false);setSelected(null);setMemo('');setTimer(30);setView('quiz');
  };
  const pauseQuiz=()=>{const s={order:quizOrder,idx:qIdx,score};localStorage.setItem('lm_quiz_v4',JSON.stringify(s));setSaved(s);setView('home');};
  useEffect(()=>{if(view!=='quiz'||answered)return;if(timer<=0){doAnswer(null);return;}const t=setInterval(()=>setTimer(p=>p-1),1000);return()=>clearInterval(t);},[view,answered,timer]);
  useEffect(()=>{if(!answered||!auto||view!=='quiz')return;const t=setTimeout(()=>nextQ(),5000);return()=>clearTimeout(t);},[answered,auto,view]);
  const doAnswer=(opt)=>{if(answered||!cq)return;setSelected(opt);setAnswered(true);if(opt===cq.a){setScore(s=>s+1);speak("Excellent, bonne réponse Lioudmila !");}else speak("Pas de souci, on retient ça ensemble.");};
  const getMemo=async()=>{if(!cq)return;setMemoLoading(true);const r=await callClaude(`Donne une astuce courte et amusante (2 phrases) pour mémoriser que la réponse à "${cq.q}" est "${cq.a}". Lioudmila est russe.`);setMemo(r);setMemoLoading(false);};
  const nextQ=()=>{if(qIdx+1<QS.length){setQIdx(qIdx+1);setAnswered(false);setSelected(null);setMemo('');setTimer(30);}else{localStorage.removeItem('lm_quiz_v4');setSaved(null);setView('results');}};

  // ── Navbar ──
  const Nav = ()=>(
    <nav style={{background:'#0A2540'}} className="text-white px-4 py-3 sticky top-0 z-50 shadow-xl">
      <div className="max-w-6xl mx-auto flex justify-between items-center">
        <div className="flex items-center gap-3 cursor-pointer" onClick={()=>setView('home')}>
          <div style={{background:'#D4AF37'}} className="p-2 rounded-full">
            <Icon name="Heart" size={18} className="text-[#0A2540]"/>
          </div>
          <span className="font-black text-lg hidden sm:block">Pour <span style={{color:'#D4AF37'}}>Lioudmila</span></span>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={()=>setShowKeyModal(true)} className="p-2 rounded-full hover:bg-white/10 transition" title="Clé API">
            <Icon name="Settings" size={16} className={apiKey?"text-green-400":"text-amber-400"}/>
          </button>
          <button onClick={()=>setShowRu(!showRu)} style={{borderColor:'#D4AF37',color:showRu?'#0A2540':'#D4AF37',background:showRu?'#D4AF37':'transparent'}} className="px-3 py-1 rounded-full text-xs font-bold border flex items-center gap-1 transition">
            <Icon name="Globe" size={12}/> {showRu?"FR/RU":"FR"}
          </button>
          <button onClick={()=>setView('home')} className="p-2 hover:text-yellow-400 bg-white/5 rounded-full"><Icon name="Home" size={16}/></button>
        </div>
      </div>
    </nav>
  );

  // ── Modal clé API ──
  const KeyModal = ()=>{
    const [k,setK]=useState(apiKey);
    return (
      <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
        <div className="bg-white rounded-3xl p-6 max-w-md w-full shadow-2xl">
          <h3 className="text-lg font-black text-slate-800 mb-2">Clé API Anthropic</h3>
          <p className="text-sm text-slate-500 mb-4">Nécessaire pour l'agent virtuel et les explications IA. Stockée localement dans votre navigateur.</p>
          <input type="password" value={k} onChange={e=>setK(e.target.value)} placeholder="sk-ant-..." className="w-full border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-blue-500 mb-4"/>
          <div className="flex gap-2">
            <button onClick={()=>saveKey(k)} className="flex-1 bg-[#0055A4] text-white py-2 rounded-xl font-bold text-sm">Enregistrer</button>
            <button onClick={()=>setShowKeyModal(false)} className="px-4 py-2 bg-slate-100 rounded-xl text-sm font-bold">Annuler</button>
          </div>
        </div>
      </div>
    );
  };

  // ── HOME ──
  if (view==='home') return (
    <div className="min-h-screen flex flex-col" style={{background:'#F8FAFC'}}>
      {showKeyModal && <KeyModal/>}
      <Nav/>
      <main className="flex-1 flex flex-col items-center justify-center p-6 max-w-6xl mx-auto w-full gap-10">
        <div className="text-center">
          <h1 className="text-5xl md:text-6xl font-black leading-tight" style={{color:'#0A2540'}}>
            Bonjour, <span style={{color:'#0055A4'}}>Lioudmila</span> 👋
          </h1>
          <p className="mt-3 text-xl text-slate-500">Préparez votre entretien sereinement</p>
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 w-full">
          {[
            {id:'book', icon:'Book', label:'Le Livre\nIllustré', sub:`${QS.length} fiches`, border:'#0055A4'},
            {id:'quiz', icon:'Play', label:'Quiz\nVisuel', sub:null, border:'#0055A4'},
            {id:'sim',  icon:'MessageSquare', label:'Agent\nVirtuel ✨', sub:chat.length>0?`${chat.length} messages`:null, border:'#D4AF37'},
            {id:'marse',icon:'Music', label:'La\nMarseillaise 🎵', sub:'Écouter & apprendre', border:'#EF4135'}
          ].map(item=>(
            <div key={item.id} className="bg-white border border-slate-200 p-7 rounded-3xl shadow-sm flex flex-col items-center gap-4 cursor-pointer hover:shadow-xl transition-all"
              style={{borderColor:'#e2e8f0'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor=item.border}
              onMouseLeave={e=>e.currentTarget.style.borderColor='#e2e8f0'}
              onClick={()=>item.id==='sim'?startSim():setView(item.id==='marse'?'marseillaise':item.id)}
            >
              <div className="p-4 rounded-full" style={{background:'#EFF6FF',color:'#0055A4'}}>
                <Icon name={item.icon} size={32}/>
              </div>
              <span className="text-lg font-black text-center whitespace-pre-line" style={{color:'#0A2540'}}>{item.label}</span>
              {item.id==='quiz' && (
                <div className="flex flex-col gap-2 w-full mt-auto">
                  {saved?.idx>0 && <button onClick={e=>{e.stopPropagation();startQuiz(true);}} className="w-full bg-green-100 text-green-700 py-2 rounded-xl font-bold text-sm flex items-center justify-center gap-2">
                    <Icon name="RotateCcw" size={13}/> Continuer ({saved.idx}/{QS.length})
                  </button>}
                  <button onClick={e=>{e.stopPropagation();startQuiz(false);}} className="w-full text-white py-2 rounded-xl font-bold text-sm flex items-center justify-center gap-2" style={{background:'#0055A4'}}>
                    <Icon name="Play" size={13}/> Nouveau quiz
                  </button>
                </div>
              )}
              {item.id!=='quiz' && item.sub && <span className="text-xs text-slate-400">{item.sub}</span>}
            </div>
          ))}
        </div>
        {!apiKey && (
          <div className="bg-amber-50 border border-amber-200 rounded-2xl px-5 py-3 text-amber-800 text-sm text-center max-w-lg">
            <strong>ℹ️</strong> Pour activer l'agent IA et les explications, ajoutez votre clé Anthropic via l'icône ⚙️ en haut à droite.
          </div>
        )}
      </main>
    </div>
  );

  // ── SIMULATEUR ──
  if (view==='sim') return (
    <div className="min-h-screen flex flex-col" style={{background:'#F8FAFC'}}>
      {showKeyModal && <KeyModal/>}
      <Nav/>
      <div className="bg-white border-b border-slate-200 p-3 flex justify-between items-center shadow-sm">
        <div className="flex items-center gap-3">
          <Icon name="ShieldCheck" size={22} className="text-blue-600"/>
          <div><div className="font-bold text-sm" style={{color:'#0A2540'}}>Entretien de naturalisation</div><div className="text-xs text-slate-500">Agent virtuel IA</div></div>
        </div>
        <div className="flex gap-2">
          <button onClick={()=>{window.speechSynthesis?.cancel();setChat([]);localStorage.removeItem('lm_chat_v4');setView('home');}} className="p-2 bg-red-50 text-red-400 rounded-xl hover:bg-red-100" title="Recommencer"><Icon name="RotateCcw" size={16}/></button>
          <button onClick={()=>setView('home')} className="px-3 py-1.5 bg-slate-100 text-slate-600 rounded-xl text-sm font-bold flex items-center gap-1"><Icon name="Pause" size={14}/> Pause</button>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto p-4 space-y-4">
        {chat.map((m,i)=>(
          <div key={i} className={`flex ${m.role==='ai'?'justify-start':'justify-end'} anim-fade`}>
            <div className={`max-w-[80%] p-4 rounded-2xl text-sm shadow-sm border ${m.role==='ai'?'bg-white border-slate-200 rounded-tl-none':'text-white font-medium rounded-tr-none'}`} style={m.role!=='ai'?{background:'#0055A4',borderColor:'#0055A4'}:{}}>
              {m.text}
              {m.role==='ai' && <button onClick={()=>speak(m.text)} className="block mt-2 p-1.5 rounded-full bg-blue-50 text-blue-500 hover:text-yellow-500"><Icon name="Volume2" size={14}/></button>}
            </div>
          </div>
        ))}
        {chatLoading && <div className="flex justify-start"><div className="bg-white p-3 rounded-2xl rounded-tl-none border border-slate-200 flex items-center gap-2 text-slate-400 text-sm"><Icon name="Loader2" size={16} className="spin"/> Réflexion…</div></div>}
        <div ref={chatEndRef}/>
      </div>
      <div className="p-4 bg-white border-t border-slate-200">
        <form onSubmit={sendChat} className="flex gap-3 max-w-3xl mx-auto">
          <input value={input} onChange={e=>setInput(e.target.value)} placeholder="Votre réponse…" className="flex-1 bg-slate-50 border border-slate-200 p-3 rounded-2xl text-sm outline-none focus:border-blue-500" disabled={chatLoading} autoFocus/>
          <button type="submit" className="text-white px-4 rounded-2xl font-bold disabled:opacity-50" style={{background:'#0055A4'}} disabled={chatLoading||!input.trim()}><Icon name="Send" size={16}/></button>
        </form>
      </div>
    </div>
  );

  // ── LIVRE ──
  if (view==='book') return (
    <div className="min-h-screen flex flex-col" style={{background:'#F8FAFC'}}>
      {showKeyModal && <KeyModal/>}
      <Nav/>
      <div className="bg-white border-b p-4 shadow-sm">
        <div className="max-w-4xl mx-auto relative">
          <Icon name="Search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"/>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Chercher (Laïcité, Marianne…)" className="w-full bg-slate-100 border border-slate-200 focus:border-blue-500 p-2.5 pl-10 rounded-full text-sm outline-none" autoFocus/>
          {search && <button onClick={()=>setSearch('')} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="X" size={14}/></button>}
        </div>
      </div>
      <main className="flex-1 p-4 md:p-6 overflow-y-auto">
        <div className="max-w-4xl mx-auto space-y-5">
          {filtered.map(item=>(
            <div key={item.id} className="bg-white rounded-3xl p-5 shadow-sm border border-slate-200 anim-fade">
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
                <div className="lg:col-span-2 space-y-3">
                  <span className="text-xs font-bold bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">{item.cat}</span>
                  <h2 className="text-lg font-black" style={{color:'#0A2540'}}>{item.q}</h2>
                  {showRu && <p className="text-sm text-blue-600 italic">🇷🇺 {item.rq}</p>}
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                    <div className="bg-blue-50 p-3 rounded-xl border-l-4 border-blue-600">
                      <div className="text-[9px] font-bold text-blue-600 uppercase tracking-widest mb-1">Réponse officielle</div>
                      <p className="font-bold text-xs" style={{color:'#0A2540'}}>{item.a}</p>
                      {showRu && <p className="text-xs text-blue-600 mt-1 opacity-70">{item.ra}</p>}
                    </div>
                    <div className="bg-green-50 p-3 rounded-xl border-l-4 border-green-500">
                      <div className="text-[9px] font-bold text-green-700 uppercase tracking-widest mb-1">En langage naturel</div>
                      <p className="font-bold text-xs italic text-slate-700">« {item.n} »</p>
                      {showRu && <p className="text-xs text-green-600 mt-1 opacity-70">{item.rn}</p>}
                    </div>
                  </div>
                  <p className="text-xs text-slate-500 italic bg-slate-50 p-3 rounded-xl">{item.det}</p>
                  <div className="flex gap-2 flex-wrap">
                    <button onClick={()=>speak(item.q+". "+item.a)} className="text-xs font-bold bg-blue-50 text-blue-600 border border-blue-200 px-3 py-1.5 rounded-xl flex items-center gap-1 hover:bg-blue-100">
                      <Icon name="Volume2" size={12}/> Écouter
                    </button>
                    {!aiExpand[item.id] ? (
                      <button onClick={()=>explainItem(item.id,item.q,item.a)} className="text-xs font-bold bg-amber-50 text-amber-700 border border-amber-200 px-3 py-1.5 rounded-xl flex items-center gap-1 hover:bg-amber-100">
                        <Icon name="Sparkles" size={12}/> Explication IA ✨
                      </button>
                    ) : aiExpand[item.id]==='loading' ? (
                      <div className="text-amber-600 flex items-center gap-1 text-xs"><Icon name="Loader2" size={12} className="spin"/> Génération…</div>
                    ) : (
                      <div className="w-full p-3 bg-amber-50 border border-amber-100 rounded-xl flex gap-2">
                        <p className="text-xs text-slate-700 italic flex-1">{aiExpand[item.id]}</p>
                        <button onClick={()=>setAiExpand(p=>({...p,[item.id]:null}))} className="text-slate-400 shrink-0"><Icon name="X" size={12}/></button>
                      </div>
                    )}
                  </div>
                </div>
                <div>
                  <img src={item.img} alt={item.cat} className="w-full h-40 lg:h-full object-cover rounded-2xl shadow-md" loading="lazy" onError={e=>e.target.style.display='none'}/>
                </div>
              </div>
            </div>
          ))}
          {filtered.length===0 && <div className="text-center py-16"><Icon name="Search" size={40} className="text-slate-300 mx-auto mb-3"/><p className="text-slate-400 font-bold">Aucun résultat pour « {search} »</p></div>}
        </div>
      </main>
    </div>
  );

  // ── QUIZ ──
  if (view==='quiz') {
    if (!cq) return null;
    return (
      <div className="min-h-screen flex flex-col" style={{background:'#F8FAFC'}}>
        <Nav/>
        <div className="bg-white border-b shadow-sm">
          <div className="h-1 progress-bar" style={{background:'#0055A4',width:`${((qIdx+1)/QS.length)*100}%`}}/>
          <div className="p-3 flex justify-between items-center">
            <span className="font-bold text-xs uppercase text-blue-600">{qIdx+1}/{QS.length} — Score : {score}</span>
            <div className="flex gap-2 items-center">
              <button onClick={()=>setAuto(!auto)} className={`px-2 py-1 rounded-lg border text-xs font-bold flex items-center gap-1 ${auto?'bg-blue-50 text-blue-600 border-blue-200':'text-slate-400 border-slate-300'}`}>
                <Icon name={auto?"FastForward":"Pause"} size={11}/> Auto
              </button>
              <button onClick={pauseQuiz} className="px-2 py-1 bg-slate-100 border border-slate-200 rounded-lg text-xs font-bold text-slate-600 flex items-center gap-1">
                <Icon name="Save" size={11}/> Pause
              </button>
              <span className={`font-mono font-bold text-sm px-2 py-0.5 rounded-full ${timer<10?'text-red-500 pulse-anim':'text-slate-700'}`}>{timer}s</span>
            </div>
          </div>
        </div>
        <div className="flex-1 p-4 max-w-2xl mx-auto w-full flex flex-col gap-4">
          <div className="relative h-40 rounded-3xl overflow-hidden shadow-md shrink-0">
            <img src={cq.img} alt={cq.cat} className="w-full h-full object-cover"/>
            <div className="absolute inset-0" style={{background:'linear-gradient(to top, #0A2540 0%, rgba(10,37,64,0.4) 50%, transparent 100%)'}}/>
            <span className="absolute top-3 left-3 bg-white/90 text-blue-700 text-xs font-bold px-2 py-0.5 rounded-full">{cq.cat}</span>
            <h3 className="absolute bottom-4 left-4 right-4 text-lg font-black text-white leading-tight drop-shadow">{cq.q}</h3>
          </div>
          <div className="flex flex-col gap-2">
            {opts.map((opt,i)=>{
              let bg='bg-white border-2 border-slate-200 text-slate-700',icon=null;
              if(answered){
                if(opt===cq.a){bg='bg-green-50 border-2 border-green-500 text-green-900';icon=<Icon name="CheckCircle" size={18} className="text-green-500 shrink-0"/>;}
                else if(opt===selected){bg='bg-red-50 border-2 border-red-500 text-red-900';icon=<Icon name="XCircle" size={18} className="text-red-500 shrink-0"/>;}
                else bg='opacity-40 border border-slate-200 bg-slate-50 text-slate-400';
              }
              return <button key={i} onClick={()=>doAnswer(opt)} disabled={answered} className={`p-3 rounded-2xl text-sm font-bold text-left flex justify-between items-center transition-all ${bg}`}><span>{opt}</span>{icon}</button>;
            })}
          </div>
          {answered && (
            <div className="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm space-y-3 anim-up">
              <div className="grid grid-cols-2 gap-2">
                <div className="bg-blue-50 border-l-4 border-blue-600 p-2 rounded-r-xl">
                  <div className="text-[9px] font-bold text-blue-600 uppercase tracking-widest">Officiel</div>
                  <p className="font-bold text-xs mt-0.5" style={{color:'#0A2540'}}>{cq.a}</p>
                </div>
                <div className="bg-green-50 border-l-4 border-green-500 p-2 rounded-r-xl">
                  <div className="text-[9px] font-bold text-green-700 uppercase tracking-widest">Naturel</div>
                  <p className="font-bold text-xs italic text-green-900 mt-0.5">« {cq.n} »</p>
                </div>
              </div>
              {!memo && !memoLoading && <button onClick={getMemo} className="text-xs font-bold text-amber-600 flex items-center gap-1 bg-amber-50 px-3 py-1.5 rounded-xl border border-amber-200"><Icon name="BrainCircuit" size={12}/> Astuce IA ✨</button>}
              {memoLoading && <div className="text-amber-600 flex items-center gap-1 text-xs"><Icon name="Loader2" size={12} className="spin"/> Génération…</div>}
              {memo && <div className="bg-amber-50 border border-amber-200 p-3 rounded-xl flex gap-2"><Icon name="Sparkles" size={14} className="text-amber-500 shrink-0 mt-0.5"/><p className="text-xs text-amber-800 italic">{memo}</p></div>}
              {!auto ? (
                <button onClick={nextQ} className="w-full text-white py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-1" style={{background:'#0055A4'}}>Suivant <Icon name="ChevronRight" size={16}/></button>
              ) : (
                <p className="text-xs text-slate-400 text-center">Passage automatique dans quelques secondes…</p>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── MARSEILLAISE ──
  if (view==='marseillaise') return (
    <div className="min-h-screen flex flex-col" style={{background:'#F8FAFC'}}>
      <Nav/>
      <div className="flex-1 p-6 max-w-2xl mx-auto w-full flex flex-col items-center">
        <div className="text-center mb-6">
          <div className="text-5xl mb-2">🇫🇷</div>
          <h2 className="text-3xl font-black text-blue-700 mb-1">La Marseillaise</h2>
          <p className="text-slate-500 text-sm italic">Cliquez sur une ligne pour l'écouter</p>
        </div>
        <div className="bg-white p-5 rounded-3xl border border-slate-200 w-full shadow-sm space-y-2">
          {MARSEILLAISE.map((item,i)=>(
            <div key={i} onClick={()=>speak(item.line)} className="group cursor-pointer hover:bg-blue-50 p-3 rounded-2xl border border-transparent hover:border-blue-100 transition-all flex items-center justify-between gap-3">
              <div>
                <p className="text-base font-black group-hover:text-blue-700 transition-colors" style={{color:'#0A2540'}}>{item.line}</p>
                <p className="text-xs text-slate-500 italic mt-0.5">{item.sub}</p>
              </div>
              <Icon name="Volume2" size={18} className="text-yellow-500 opacity-0 group-hover:opacity-100 shrink-0 transition"/>
            </div>
          ))}
        </div>
        <button onClick={()=>speak(MARSEILLAISE.map(l=>l.line).join(', '))} className="mt-5 text-white px-7 py-3 rounded-full font-bold flex items-center gap-2 shadow-lg" style={{background:'#EF4135'}}>
          <Icon name="Volume2" size={16}/> Écouter le refrain complet
        </button>
      </div>
    </div>
  );

  // ── RÉSULTATS ──
  if (view==='results') {
    const pct=Math.round((score/QS.length)*100);
    return (
      <div className="min-h-screen flex flex-col items-center justify-center p-10 text-center relative overflow-hidden" style={{background:'#0A2540',color:'white'}}>
        <Icon name="Award" size={90} className="mb-5" style={{color:'#D4AF37'}}/>
        <h2 className="text-4xl font-black mb-2">Bravo, Lioudmila !</h2>
        <p className="text-blue-200 italic mb-6 max-w-sm">Chaque entraînement vous rapproche de votre objectif.</p>
        <div className="text-6xl font-black mb-1">{score}<span className="text-2xl" style={{color:'#D4AF37'}}> / {QS.length}</span></div>
        <p className="font-bold text-lg mb-8" style={{color:'#D4AF37'}}>{pct}% de réussite</p>
        <div className="flex flex-col sm:flex-row gap-3">
          <button onClick={()=>startQuiz(false)} className="px-7 py-3 rounded-full font-black flex items-center gap-2 shadow-lg" style={{background:'#D4AF37',color:'#0A2540'}}>
            <Icon name="RefreshCw" size={16}/> Recommencer
          </button>
          <button onClick={()=>setView('home')} className="px-7 py-3 rounded-full font-black" style={{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)'}}>
            <Icon name="Home" size={16} className="inline mr-1"/> Accueil
          </button>
        </div>
      </div>
    );
  }
  return null;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
