<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pour Lioudmila 🇫🇷</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F8FAFC;color:#1e293b}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .3s ease forwards}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
.progress{transition:width .5s ease}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Données ──
const QS=[
  {id:1,cat:"Valeurs",q:"Quelle est la devise de la République française ?",a:"Liberté, Égalité, Fraternité.",fakes:["Justice, Solidarité, Unité.","Honneur, Patrie, Valeur."],n:"Vivre libre, tous égaux et solidaires.",rq:"Каков девиз Французской Республики?",ra:"Свобода, Равенство, Братство.",det:"Inscrite sur toutes les mairies, c'est le fondement de la vie en France.",img:"https://images.unsplash.com/photo-1499856871958-5b9627545d1a?auto=format&fit=crop&w=800&q=80"},
  {id:2,cat:"Laïcité",q:"Que signifie le principe de Laïcité ?",a:"La séparation des Églises et de l'État.",fakes:["L'interdiction de toute religion.","L'obligation d'être catholique."],n:"L'État est neutre. La religion est une affaire personnelle.",rq:"Что означает принцип лаицизма?",ra:"Разделение церквей и государства.",det:"Votée en 1905, l'État ne favorise aucune religion.",img:"https://images.unsplash.com/photo-1543783232-0a440939c63c?auto=format&fit=crop&w=800&q=80"},
  {id:3,cat:"Symboles",q:"Qui est Marianne ?",a:"L'allégorie de la République française.",fakes:["La première femme présidente.","Une sainte catholique protectrice."],n:"La femme qui représente la France. Son buste est dans les mairies.",rq:"Кто такая Марианна?",ra:"Аллегория Французской Республики.",det:"Elle porte un bonnet phrygien, symbole des esclaves libérés.",img:"https://images.unsplash.com/photo-1604005953049-7e53f1d7a8d5?auto=format&fit=crop&w=800&q=80"},
  {id:4,cat:"Histoire",q:"En quelle année a débuté la Révolution française ?",a:"En 1789.",fakes:["En 1815.","En 1848."],n:"1789 : le peuple a pris la Bastille.",rq:"В каком году началась Французская революция?",ra:"В 1789 году.",det:"Fin de la monarchie absolue, naissance de la République.",img:"https://images.unsplash.com/photo-1584027410058-297ce20ec888?auto=format&fit=crop&w=800&q=80"},
  {id:5,cat:"Institutions",q:"Qui vote les lois en France ?",a:"Le Parlement (Assemblée nationale et Sénat).",fakes:["Le Président de la République seul.","Le Conseil d'État."],n:"Les députés et sénateurs décident des lois.",rq:"Кто принимает законы?",ra:"Парламент (Национальное собрание и Сенат).",det:"Le peuple élit des représentants : c'est la démocratie.",img:"https://images.unsplash.com/photo-1541599540903-216a46ca1dc0?auto=format&fit=crop&w=800&q=80"},
  {id:6,cat:"Symboles",q:"De quelles couleurs est le drapeau français ?",a:"Bleu, Blanc, Rouge.",fakes:["Rouge, Or, Vert.","Bleu, Blanc, Vert."],n:"Le tricolore, symbole de la Révolution.",rq:"Какие цвета флага Франции?",ra:"Синий, Белый, Красный.",det:"Bleu et rouge pour Paris, blanc pour le roi.",img:"https://images.unsplash.com/photo-1551415923-a2297c7fda79?auto=format&fit=crop&w=800&q=80"},
  {id:7,cat:"Valeurs",q:"Quel est le principe fondamental de la démocratie française ?",a:"La souveraineté appartient au peuple.",fakes:["Le président détient tous les pouvoirs.","L'armée garantit l'ordre."],n:"C'est le peuple qui est le maître.",rq:"Каков основной принцип демократии?",ra:"Суверенитет принадлежит народу.",det:"Article 3 de la Constitution de 1958.",img:"https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?auto=format&fit=crop&w=800&q=80"},
  {id:8,cat:"Histoire",q:"Quel est l'hymne national français ?",a:"La Marseillaise.",fakes:["La Brabançonne.","Le Chant du Départ."],n:"La Marseillaise, écrite en 1792.",rq:"Каков национальный гимн Франции?",ra:"Марсельеза.",det:"Composée par Rouget de Lisle, hymne national depuis 1795.",img:"https://images.unsplash.com/photo-1560440021-33f9b867899d?auto=format&fit=crop&w=800&q=80"}
];
const MARSE=[
  {l:"Allons enfants de la Patrie,",s:"Appel à tous les citoyens"},
  {l:"Le jour de gloire est arrivé !",s:"Le grand jour de la liberté"},
  {l:"Contre nous de la tyrannie,",s:"Face à l'injustice"},
  {l:"L'étendard sanglant est levé,",s:"Le drapeau de la résistance"},
  {l:"Aux armes, citoyens,",s:"Prenez vos défenses"},
  {l:"Formez vos bataillons,",s:"Unissez-vous ensemble"},
  {l:"Marchons, marchons !",s:"Avançons avec courage"},
  {l:"Qu'un sang impur abreuve nos sillons !",s:"Que la liberté triomphe"}
];

// ── State ──
let state={view:'home',showRu:false,search:'',quiz:{order:[],idx:0,score:0,answered:false,selected:null,timer:30,auto:true,memo:'',memoLoading:false},chat:[],chatLoading:false,aiExpand:{},saved:null,apiKey:''};

function load(){
  try{const s=localStorage.getItem('lm_s');if(s)state.saved=JSON.parse(s);}catch{}
  try{const c=localStorage.getItem('lm_c');if(c)state.chat=JSON.parse(c);}catch{}
  try{const k=localStorage.getItem('lm_k');if(k){state.apiKey=k;}}catch{}
}
function save(){try{localStorage.setItem('lm_c',JSON.stringify(state.chat));}catch{}}

function speak(t){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='fr-FR';u.rate=0.85;u.pitch=1.05;
  const vs=window.speechSynthesis.getVoices();
  const fr=vs.find(v=>v.lang.startsWith('fr'));
  if(fr)u.voice=fr;
  window.speechSynthesis.speak(u);
}

async function callClaude(prompt){
  if(!state.apiKey)return"Ajoutez votre clé Anthropic via le bouton ⚙️ pour activer l'IA.";
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":state.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-calls":"true"},body:JSON.stringify({model:"claude-haiku-4-5",max_tokens:400,system:"Tu es un agent de préfecture bienveillant. Tu aides Lioudmila (russe) à préparer son entretien de naturalisation. Réponds en français, 3 phrases max, ton encourageant.",messages:[{role:"user",content:prompt}]})});
    if(!r.ok)return"Assistant indisponible.";
    const d=await r.json();return d.content?.[0]?.text||"Erreur.";
  }catch{return"Assistant indisponible.";}
}

function shuffle(arr,seed){
  const s=[...arr];let r=seed||Date.now();
  for(let i=s.length-1;i>0;i--){r=(r*1664525+1013904223)&0xffffffff;const j=Math.abs(r)%(i+1);[s[i],s[j]]=[s[j],s[i]];}
  return s;
}

// ── Render ──
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  const el=document.createElement('div');
  el.innerHTML=getHTML();
  app.appendChild(el);
  bindEvents();
  if(state.view==='sim')scrollChat();
}

function nav(){
  return `<nav style="background:#0A2540" class="text-white px-4 py-3 sticky top-0 z-50 shadow-xl">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3 cursor-pointer" onclick="go('home')">
        <div style="background:#D4AF37" class="p-2 rounded-full">❤️</div>
        <span class="font-black text-lg hidden sm:block">Pour <span style="color:#D4AF37">Lioudmila</span></span>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="toggleKey()" class="p-2 rounded-full hover:bg-white/10 text-sm" title="Clé API">${state.apiKey?'🟢':'⚙️'}</button>
        <button onclick="toggleRu()" style="border-color:#D4AF37;color:${state.showRu?'#0A2540':'#D4AF37'};background:${state.showRu?'#D4AF37':'transparent'}" class="px-3 py-1 rounded-full text-xs font-bold border transition">
          🌐 ${state.showRu?'FR/RU':'FR'}
        </button>
        <button onclick="go('home')" class="p-2 hover:text-yellow-400 bg-white/5 rounded-full">🏠</button>
      </div>
    </div>
  </nav>`;
}

function keyModal(){
  if(!state.showKeyModal)return'';
  return `<div class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl p-6 max-w-md w-full shadow-2xl">
      <h3 class="text-lg font-black text-slate-800 mb-2">🔑 Clé API Anthropic</h3>
      <p class="text-sm text-slate-500 mb-4">Pour activer l'agent virtuel et les explications IA. Stockée localement, jamais envoyée ailleurs.</p>
      <input id="keyInput" type="password" value="${state.apiKey}" placeholder="sk-ant-..." class="w-full border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-blue-500 mb-4"/>
      <div class="flex gap-2">
        <button onclick="saveKey()" class="flex-1 text-white py-2 rounded-xl font-bold text-sm" style="background:#0055A4">Enregistrer</button>
        <button onclick="closeKey()" class="px-4 py-2 bg-slate-100 rounded-xl text-sm font-bold">Annuler</button>
      </div>
    </div>
  </div>`;
}

function getHTML(){
  const v=state.view;
  if(v==='home')return homeHTML();
  if(v==='book')return bookHTML();
  if(v==='quiz')return quizHTML();
  if(v==='sim')return simHTML();
  if(v==='marse')return marseHTML();
  if(v==='results')return resultsHTML();
  return homeHTML();
}

function homeHTML(){
  return `${keyModal()}${nav()}
  <div style="background:linear-gradient(135deg,#F8FAFC 0%,#EFF6FF 100%)" class="min-h-screen">
  <main class="max-w-5xl mx-auto p-6 flex flex-col items-center gap-10 pt-16">
    <div class="text-center">
      <h1 class="text-5xl md:text-6xl font-black leading-tight" style="color:#0A2540">
        Bonjour, <span style="color:#0055A4">Lioudmila</span> 👋
      </h1>
      <p class="mt-4 text-xl text-slate-500">Préparez votre entretien de naturalisation sereinement</p>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 w-full">
      ${card('book','📚','Le Livre Illustré',`${QS.length} fiches détaillées`,'#0055A4')}
      ${quizCard()}
      ${card('sim','💬','Agent Virtuel ✨',state.chat.length?`${state.chat.length} messages`:'Simulez l\'entretien','#D4AF37')}
      ${card('marse','🎵','La Marseillaise','Écouter & apprendre','#EF4135')}
    </div>
    ${!state.apiKey?`<div class="bg-amber-50 border border-amber-200 rounded-2xl px-5 py-3 text-amber-800 text-sm text-center max-w-lg">
      <strong>ℹ️</strong> Pour activer l'IA, cliquez sur ⚙️ en haut à droite et entrez votre clé Anthropic.
    </div>`:''}
  </main></div>`;
}

function card(id,icon,label,sub,color){
  return `<div onclick="go('${id}')" class="bg-white border-2 border-slate-100 p-7 rounded-3xl shadow-sm flex flex-col items-center gap-4 cursor-pointer transition-all hover:shadow-xl hover:border-2" style="transition:border-color .2s" onmouseover="this.style.borderColor='${color}'" onmouseout="this.style.borderColor='#f1f5f9'">
    <div class="text-4xl">${icon}</div>
    <span class="text-lg font-black text-center" style="color:#0A2540">${label}</span>
    <span class="text-xs text-slate-400">${sub}</span>
  </div>`;
}

function quizCard(){
  const hasSave=state.saved&&state.saved.idx>0;
  return `<div class="bg-white border-2 border-slate-100 p-7 rounded-3xl shadow-sm flex flex-col items-center gap-4 transition-all hover:shadow-xl" onmouseover="this.style.borderColor='#0055A4'" onmouseout="this.style.borderColor='#f1f5f9'">
    <div class="text-4xl">🎯</div>
    <span class="text-lg font-black" style="color:#0A2540">Quiz Visuel</span>
    <div class="flex flex-col gap-2 w-full mt-auto">
      ${hasSave?`<button onclick="startQuiz(true)" class="w-full bg-green-100 text-green-700 py-2 rounded-xl font-bold text-sm">↩️ Continuer (${state.saved.idx}/${QS.length})</button>`:''}
      <button onclick="startQuiz(false)" class="w-full text-white py-2 rounded-xl font-bold text-sm" style="background:#0055A4">▶️ Nouveau quiz</button>
    </div>
  </div>`;
}

function bookHTML(){
  const t=state.search.toLowerCase();
  const filtered=QS.filter(q=>q.q.toLowerCase().includes(t)||q.a.toLowerCase().includes(t)||q.cat.toLowerCase().includes(t));
  return `${keyModal()}${nav()}
  <div class="bg-white border-b p-4 shadow-sm sticky top-16 z-40">
    <div class="max-w-4xl mx-auto relative">
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
      <input id="searchBox" type="text" value="${state.search}" placeholder="Chercher (Laïcité, Marianne…)" oninput="doSearch(this.value)" class="w-full bg-slate-100 border border-slate-200 p-2.5 pl-10 rounded-full text-sm outline-none focus:border-blue-500" autofocus/>
      ${state.search?`<button onclick="doSearch('')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">✕</button>`:''}
    </div>
  </div>
  <div class="max-w-4xl mx-auto p-4 space-y-5">
    ${filtered.length?filtered.map(item=>`
    <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-200 fade">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
        <div class="lg:col-span-2 space-y-3">
          <span class="text-xs font-bold bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">${item.cat}</span>
          <h2 class="text-lg font-black" style="color:#0A2540">${item.q}</h2>
          ${state.showRu?`<p class="text-sm text-blue-600 italic">🇷🇺 ${item.rq}</p>`:''}
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
            <div class="bg-blue-50 p-3 rounded-xl border-l-4 border-blue-600">
              <div class="text-xs font-bold text-blue-600 mb-1">✅ RÉPONSE OFFICIELLE</div>
              <p class="font-bold text-sm" style="color:#0A2540">${item.a}</p>
              ${state.showRu?`<p class="text-xs text-blue-500 mt-1">${item.ra}</p>`:''}
            </div>
            <div class="bg-green-50 p-3 rounded-xl border-l-4 border-green-500">
              <div class="text-xs font-bold text-green-700 mb-1">💬 EN NATUREL</div>
              <p class="font-bold text-sm italic text-slate-700">« ${item.n} »</p>
            </div>
          </div>
          <p class="text-xs text-slate-500 italic bg-slate-50 p-3 rounded-xl">${item.det}</p>
          <div class="flex gap-2 flex-wrap">
            <button onclick="speak('${item.q.replace(/'/g,"\\'")}. ${item.a.replace(/'/g,"\\'")}')" class="text-xs font-bold bg-blue-50 text-blue-600 border border-blue-200 px-3 py-1.5 rounded-xl">🔊 Écouter</button>
            ${renderExplain(item.id,item.q,item.a)}
          </div>
        </div>
        <div>
          <img src="${item.img}" alt="${item.cat}" class="w-full h-40 lg:h-full object-cover rounded-2xl shadow-md" loading="lazy" onerror="this.style.display='none'"/>
        </div>
      </div>
    </div>`).join(''):`<div class="text-center py-16 text-slate-400">
      <div class="text-5xl mb-3">🔍</div>
      <p class="font-bold">Aucun résultat pour « ${state.search} »</p>
      <button onclick="doSearch('')" class="mt-3 text-blue-600 underline text-sm">Effacer</button>
    </div>`}
  </div>`;
}

function renderExplain(id,q,a){
  const exp=state.aiExpand[id];
  if(!exp)return`<button onclick="explainItem(${id},'${q.replace(/'/g,"\\'")}','${a.replace(/'/g,"\\'")}')" class="text-xs font-bold bg-amber-50 text-amber-700 border border-amber-200 px-3 py-1.5 rounded-xl">✨ Explication IA</button>`;
  if(exp==='loading')return`<span class="text-xs text-amber-600 flex items-center gap-1"><span class="spin">⏳</span> Génération…</span>`;
  return`<div class="w-full p-3 bg-amber-50 border border-amber-100 rounded-xl flex gap-2">
    <p class="text-xs text-slate-700 italic flex-1">${exp}</p>
    <button onclick="clearExplain(${id})" class="text-slate-400 text-xs shrink-0">✕</button>
  </div>`;
}

function quizHTML(){
  const q=state.quiz;
  if(!q.order.length)return homeHTML();
  const cq=QS[q.order[q.idx]];
  const opts=shuffle([cq.a,...cq.fakes],cq.id*37+q.idx);
  const pct=Math.round(((q.idx+1)/QS.length)*100);
  return `${keyModal()}${nav()}
  <div class="bg-white border-b shadow-sm">
    <div class="h-1 progress" style="background:#0055A4;width:${pct}%"></div>
    <div class="p-3 flex justify-between items-center max-w-2xl mx-auto">
      <span class="font-bold text-xs text-blue-600">${q.idx+1}/${QS.length} — Score : ${q.score}</span>
      <div class="flex gap-2 items-center">
        <button onclick="toggleAuto()" class="px-2 py-1 rounded-lg border text-xs font-bold ${q.auto?'bg-blue-50 text-blue-600 border-blue-200':'text-slate-400 border-slate-300'}">${q.auto?'⏩ Auto':'⏸ Manuel'}</button>
        <button onclick="pauseQuiz()" class="px-2 py-1 bg-slate-100 border border-slate-200 rounded-lg text-xs font-bold text-slate-600">💾 Pause</button>
        <span class="font-mono font-bold text-sm px-2 py-0.5 rounded-full ${q.timer<10?'text-red-500':'text-slate-700'}">${q.timer}s</span>
      </div>
    </div>
  </div>
  <div class="max-w-2xl mx-auto p-4 flex flex-col gap-4">
    <div class="relative h-44 rounded-3xl overflow-hidden shadow-md">
      <img src="${cq.img}" class="w-full h-full object-cover"/>
      <div class="absolute inset-0" style="background:linear-gradient(to top,#0A2540,rgba(10,37,64,.4),transparent)"></div>
      <span class="absolute top-3 left-3 bg-white/90 text-blue-700 text-xs font-bold px-2 py-0.5 rounded-full">${cq.cat}</span>
      <h3 class="absolute bottom-4 left-4 right-4 text-xl font-black text-white leading-tight drop-shadow">${cq.q}</h3>
    </div>
    <div class="flex flex-col gap-2">
      ${opts.map(opt=>{
        let cls='bg-white border-2 border-slate-200 text-slate-700';
        let icon='';
        if(q.answered){
          if(opt===cq.a){cls='bg-green-50 border-2 border-green-500 text-green-900';icon=' ✅';}
          else if(opt===q.selected){cls='bg-red-50 border-2 border-red-500 text-red-900';icon=' ❌';}
          else cls='opacity-40 border border-slate-200 bg-slate-50 text-slate-400';
        }
        return`<button onclick="doAnswer('${opt.replace(/'/g,"\\'")}','${cq.a.replace(/'/g,"\\'")}','${cq.n.replace(/'/g,"\\'")}')" ${q.answered?'disabled':''} class="p-3 rounded-2xl text-sm font-bold text-left transition-all ${cls}">${opt}${icon}</button>`;
      }).join('')}
    </div>
    ${q.answered?answerPanel(cq):''}
  </div>`;
}

function answerPanel(cq){
  const q=state.quiz;
  return`<div class="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm space-y-3 fade">
    <div class="grid grid-cols-2 gap-2">
      <div class="bg-blue-50 border-l-4 border-blue-600 p-3 rounded-r-xl">
        <div class="text-xs font-bold text-blue-600 mb-1">OFFICIEL</div>
        <p class="font-bold text-xs" style="color:#0A2540">${cq.a}</p>
      </div>
      <div class="bg-green-50 border-l-4 border-green-500 p-3 rounded-r-xl">
        <div class="text-xs font-bold text-green-700 mb-1">NATUREL</div>
        <p class="font-bold text-xs italic text-green-900">« ${cq.n} »</p>
      </div>
    </div>
    ${!q.memo&&!q.memoLoading?`<button onclick="getMemo('${cq.q.replace(/'/g,"\\'")}','${cq.a.replace(/'/g,"\\'")}'" ) class="text-xs font-bold text-amber-600 flex items-center gap-1 bg-amber-50 px-3 py-1.5 rounded-xl border border-amber-200">🧠 Astuce IA ✨</button>`:''}
    ${q.memoLoading?`<span class="text-amber-600 text-xs flex items-center gap-1"><span class="spin">⏳</span> Génération…</span>`:''}
    ${q.memo?`<div class="bg-amber-50 border border-amber-200 p-3 rounded-xl"><p class="text-xs text-amber-800 italic">✨ ${q.memo}</p></div>`:''}
    ${!q.auto?`<button onclick="nextQ()" class="w-full text-white py-2.5 rounded-xl font-bold text-sm" style="background:#0055A4">Suivant ➡️</button>`
    :`<p class="text-xs text-slate-400 text-center">Passage automatique dans quelques secondes…</p>`}
  </div>`;
}

function simHTML(){
  return`${keyModal()}${nav()}
  <div class="flex flex-col" style="height:calc(100vh - 57px)">
    <div class="bg-white border-b p-3 flex justify-between items-center shadow-sm">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🏛️</span>
        <div><div class="font-bold text-sm" style="color:#0A2540">Entretien de naturalisation</div><div class="text-xs text-slate-500">Agent virtuel IA</div></div>
      </div>
      <div class="flex gap-2">
        <button onclick="clearChat()" class="p-2 bg-red-50 text-red-400 rounded-xl text-sm" title="Recommencer">🔄</button>
        <button onclick="go('home')" class="px-3 py-1.5 bg-slate-100 text-slate-600 rounded-xl text-sm font-bold">⏸ Pause</button>
      </div>
    </div>
    <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-4" style="background:#F8FAFC">
      ${state.chat.map((m,i)=>`
      <div class="flex ${m.role==='ai'?'justify-start':'justify-end'}">
        <div class="max-w-xs md:max-w-md p-4 rounded-2xl text-sm shadow-sm ${m.role==='ai'?'bg-white border border-slate-200 rounded-tl-none':'text-white font-medium rounded-tr-none'}" style="${m.role!=='ai'?'background:#0055A4':''}">
          ${m.text}
          ${m.role==='ai'?`<button onclick="speak('${m.text.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')" class="block mt-2 text-blue-500 text-xs">🔊 Écouter</button>`:''}
        </div>
      </div>`).join('')}
      ${state.chatLoading?`<div class="flex justify-start"><div class="bg-white p-3 rounded-2xl rounded-tl-none border border-slate-200 text-slate-400 text-sm">⏳ L'agent réfléchit…</div></div>`:''}
      <div id="chatEnd"></div>
    </div>
    <div class="p-4 bg-white border-t border-slate-200">
      <form onsubmit="sendMsg(event)" class="flex gap-3 max-w-3xl mx-auto">
        <input id="chatIn" type="text" placeholder="Votre réponse…" class="flex-1 bg-slate-50 border border-slate-200 p-3 rounded-2xl text-sm outline-none focus:border-blue-500" ${state.chatLoading?'disabled':''}/>
        <button type="submit" class="text-white px-4 rounded-2xl font-bold text-sm" style="background:#0055A4" ${state.chatLoading?'disabled':''}>📨</button>
      </form>
    </div>
  </div>`;
}

  <div class="max-w-2xl mx-auto p-6 flex flex-col items-center gap-6">

function resultsHTML(){
  const q=state.quiz;
  const pct=Math.round((q.score/QS.length)*100);
  return`${keyModal()}
  <div class="min-h-screen flex flex-col items-center justify-center p-10 text-center" style="background:#0A2540;color:white">
    <div class="text-7xl mb-5">🏆</div>
    <h2 class="text-4xl font-black mb-2">Bravo, Lioudmila !</h2>
    <p class="text-blue-200 italic mb-6 max-w-sm">Chaque entraînement vous rapproche de votre objectif.</p>
    <div class="text-6xl font-black mb-1">${q.score}<span class="text-2xl" style="color:#D4AF37"> / ${QS.length}</span></div>

    <div class="flex flex-col sm:flex-row gap-3">
      <button onclick="startQuiz(false)" class="px-7 py-3 rounded-full font-black" style="background:#D4AF37;color:#0A2540">🔄 Recommencer</button>
      <button onclick="go('home')" class="px-7 py-3 rounded-full font-black border border-white/20" style="background:rgba(255,255,255,.1)">🏠 Accueil</button>
    </div>

}

// ── Actions ──
function go(v){
  if(v==='sim'&&state.chat.length===0){
    const m="Bonjour Lioudmila ! Je suis l'agent de préfecture. Pourriez-vous vous présenter brièvement ?";
    state.chat=[{role:'ai',text:m}];save();setTimeout(()=>speak(m),300);
  }
  state.view=v;render();
}
function toggleRu(){state.showRu=!state.showRu;render();}
function toggleKey(){state.showKeyModal=true;render();}
function closeKey(){state.showKeyModal=false;render();}
function saveKey(){const k=document.getElementById('keyInput').value.trim();state.apiKey=k;localStorage.setItem('lm_k',k);state.showKeyModal=false;render();}
function doSearch(v){state.search=v;render();setTimeout(()=>{const el=document.getElementById('searchBox');if(el){el.focus();el.value=v;el.setSelectionRange(v.length,v.length);}},0);}

function startQuiz(resume){
  if(resume&&state.saved){
    state.quiz.order=state.saved.order;state.quiz.idx=state.saved.idx;state.quiz.score=state.saved.score;
  } else {
    state.quiz.order=shuffle(QS.map((_,i)=>i),Date.now());state.quiz.idx=0;state.quiz.score=0;
  }
  state.quiz.answered=false;state.quiz.selected=null;state.quiz.memo='';state.quiz.timer=30;
  state.view='quiz';render();startTimer();
}
function pauseQuiz(){
  state.saved={order:state.quiz.order,idx:state.quiz.idx,score:state.quiz.score};
  localStorage.setItem('lm_s',JSON.stringify(state.saved));
  clearInterval(window._timer);state.view='home';render();
}
function toggleAuto(){state.quiz.auto=!state.quiz.auto;render();}

let _timer=null;
function startTimer(){
  clearInterval(_timer);
  _timer=setInterval(()=>{
    if(state.view!=='quiz'||state.quiz.answered){clearInterval(_timer);return;}
    state.quiz.timer--;
    if(state.quiz.timer<=0){clearInterval(_timer);doAnswer(null,QS[state.quiz.order[state.quiz.idx]].a,'');}
    else render();
  },1000);
}

function doAnswer(opt,correct,nat){
  if(state.quiz.answered)return;
  state.quiz.selected=opt;state.quiz.answered=true;
  if(opt===correct){state.quiz.score++;speak("Excellent, bonne réponse Lioudmila !");}
  else speak("Pas de souci, on retient ça ensemble.");
  render();
  if(state.quiz.auto)setTimeout(()=>nextQ(),5000);
}
async function getMemo(q,a){
  state.quiz.memoLoading=true;render();
  const r=await callClaude(`Astuce courte (2 phrases) pour mémoriser que la réponse à "${q}" est "${a}". Lioudmila est russe.`);
  state.quiz.memo=r;state.quiz.memoLoading=false;render();
}
function nextQ(){
  clearInterval(_timer);
  if(state.quiz.idx+1<QS.length){
    state.quiz.idx++;state.quiz.answered=false;state.quiz.selected=null;state.quiz.memo='';state.quiz.timer=30;
    render();startTimer();
  } else {
    localStorage.removeItem('lm_s');state.saved=null;state.view='results';render();
  }
}

async function explainItem(id,q,a){
  state.aiExpand[id]='loading';render();
  const r=await callClaude(`Explique en 3 phrases simples pourquoi "${q}" est important en France. Réponse : "${a}".`);
  state.aiExpand[id]=r;render();
}
function clearExplain(id){state.aiExpand[id]=null;render();}

async function sendMsg(e){
  e.preventDefault();
  const inp=document.getElementById('chatIn');
  if(!inp||!inp.value.trim()||state.chatLoading)return;
  const txt=inp.value.trim();
  state.chat.push({role:'user',text:txt});inp.value='';save();
  state.chatLoading=true;render();
  const ctx=state.chat.map(m=>`${m.role==='ai'?'Agent':'Lioudmila'}: ${m.text}`).join('\n');
  const r=await callClaude(`${ctx}\n\nAgent: (2-3 phrases encourageantes, puis pose une question sur la France.)`);
  state.chat.push({role:'ai',text:r});save();state.chatLoading=false;render();speak(r);
}
function clearChat(){window.speechSynthesis?.cancel();state.chat=[];localStorage.removeItem('lm_c');state.view='home';render();}
function scrollChat(){setTimeout(()=>{const el=document.getElementById('chatEnd');if(el)el.scrollIntoView({behavior:'smooth'});},100);}

function bindEvents(){}

// ── Init ──
window.go=go;window.toggleRu=toggleRu;window.toggleKey=toggleKey;window.closeKey=closeKey;window.saveKey=saveKey;
window.doSearch=doSearch;window.startQuiz=startQuiz;window.pauseQuiz=pauseQuiz;window.toggleAuto=toggleAuto;
window.doAnswer=doAnswer;window.getMemo=getMemo;window.nextQ=nextQ;window.explainItem=explainItem;
window.clearExplain=clearExplain;window.sendMsg=sendMsg;window.clearChat=clearChat;window.speak=speak;

load();
window.speechSynthesis?.addEventListener('voiceschanged',()=>{});
render();
</script>
</body>
</html>
