function speak(t){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='fr-FR';u.rate=0.85;u.pitch=1.05;
  const vs=window.speechSynthesis.getVoices();
  const fr=vs.find(v=>v.lang.startsWith('fr'));
  if(fr)u.voice=fr;
  window.speechSynthesis.speak(u);
}

async function callClaude(prompt){
  if(!state.apiKey)return"Ajoutez votre clé Anthropic via le bouton ⚙️ pour activer l'IA.";
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":state.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-calls":"true"},body:JSON.stringify({model:"claude-haiku-4-5",max_tokens:400,system:"Tu es un agent de préfecture bienveillant. Tu aides Lioudmila (d'origine russe) à préparer son entretien de naturalisation française. Réponds en français, 3 phrases max, sois chaleureux et encourageant.",messages:[{role:"user",content:prompt}]})});
    if(!r.ok)return"Assistant indisponible.";
    const d=await r.json();return d.content?.[0]?.text||"Erreur.";
  }catch{return"Assistant indisponible.";}
}

function shuffle(arr,seed){
  const s=[...arr];let r=seed||Date.now();
  for(let i=s.length-1;i>0;i--){r=(r*1664525+1013904223)&0xffffffff;const j=Math.abs(r)%(i+1);[s[i],s[j]]=[s[j],s[i]];}
  return s;
}

// ─── ACTIONS ───
function go(v){
  if(v==='sim'&&state.chat.length===0){
    const m="Bonjour Lioudmila ! Je suis l'agent de préfecture. Bienvenue. Pourriez-vous vous présenter brièvement ?";
    state.chat=[{role:'ai',text:m}];saveChat();setTimeout(()=>speak(m),300);
  }
  state.view=v;render();
}
function toggleRu(){state.showRu=!state.showRu;render();}
function toggleKey(){state.showKeyModal=true;render();setTimeout(()=>{const el=document.getElementById('keyInput');if(el)el.focus();},50);}
function closeKey(){state.showKeyModal=false;render();}
function saveKey(){const k=(document.getElementById('keyInput')||{}).value||'';state.apiKey=k.trim();if(k.trim())localStorage.setItem('lm_k',k.trim());state.showKeyModal=false;render();}
function doSearch(v){state.search=v;render();setTimeout(()=>{const el=document.getElementById('searchBox');if(el){el.focus();el.value=v;el.setSelectionRange(v.length,v.length);}},0);}

function startQuiz(resume){
  if(resume&&state.saved){state.quiz.order=state.saved.order;state.quiz.idx=state.saved.idx;state.quiz.score=state.saved.score;}
  else{state.quiz.order=shuffle(QS.map((_,i)=>i),Date.now());state.quiz.idx=0;state.quiz.score=0;}
  state.quiz.answered=false;state.quiz.selected=null;state.quiz.memo='';state.quiz.timer=30;
  state.view='quiz';render();startTimer();
}
function pauseQuiz(){
  const s={order:state.quiz.order,idx:state.quiz.idx,score:state.quiz.score};
  localStorage.setItem('lm_s3',JSON.stringify(s));state.saved=s;
  clearInterval(window._tmr);state.view='home';render();
}
function toggleAuto(){state.quiz.auto=!state.quiz.auto;render();}

function startTimer(){
  clearInterval(window._tmr);
  window._tmr=setInterval(()=>{
    if(state.view!=='quiz'||state.quiz.answered){clearInterval(window._tmr);return;}
    state.quiz.timer--;
    if(state.quiz.timer<=0){clearInterval(window._tmr);const cq=QS[state.quiz.order[state.quiz.idx]];doAnswer('',cq.a,cq.n);}
    else{
      const el=document.querySelector('.font-mono.font-bold.text-sm');
      if(el){el.textContent=state.quiz.timer+'s';el.className='font-mono font-bold text-sm px-2 '+(state.quiz.timer<10?'text-red-500':'text-slate-700');}
    }
  },1000);
}

function doAnswer(opt,correct,nat){
  if(state.quiz.answered)return;
  clearInterval(window._tmr);
  state.quiz.selected=opt;state.quiz.answered=true;
  if(opt===correct){state.quiz.score++;speak("Excellent, bonne réponse Lioudmila !");}
  else speak("Pas de souci, on retient ça ensemble.");
  render();
  if(state.quiz.auto)setTimeout(()=>nextQ(),5000);
}
async function getMemo(q,a){
  state.quiz.memoLoading=true;render();
  const r=await callClaude('Donne une astuce courte et amusante (2 phrases max) pour mémoriser que la réponse à "'+q+'" est "'+a+'". Lioudmila est russe, sois créatif.');
  state.quiz.memo=r;state.quiz.memoLoading=false;render();
}
function nextQ(){
  clearInterval(window._tmr);
  if(state.quiz.idx+1<QS.length){state.quiz.idx++;state.quiz.answered=false;state.quiz.selected=null;state.quiz.memo='';state.quiz.timer=30;render();startTimer();}
  else{localStorage.removeItem('lm_s3');state.saved=null;state.view='results';render();}
}

async function explainItem(id,q,a){
  state.aiExpand[id]='loading';render();
  const r=await callClaude('Explique en 3 phrases simples et encourageantes pourquoi "'+q+'" est important pour vivre en France. Réponse correcte : "'+a+'".');
  state.aiExpand[id]=r;render();
}
function clearExp(id){state.aiExpand[id]=null;render();}

async function sendMsg(e){
  e.preventDefault();
  const inp=document.getElementById('chatIn');
  if(!inp||!inp.value.trim()||state.chatLoading)return;
  const txt=inp.value.trim();
  state.chat.push({role:'user',text:txt});inp.value='';saveChat();
  state.chatLoading=true;render();
  const ctx=state.chat.map(m=>(m.role==='ai'?'Agent':'Lioudmila')+': '+m.text).join('\n');
  const r=await callClaude(ctx+'\n\nAgent: (Réponds en 2-3 phrases en français, sois encourageant. Pose ensuite une question sur les valeurs, l\'histoire ou les institutions françaises.)');
  state.chat.push({role:'ai',text:r});saveChat();state.chatLoading=false;render();speak(r);
}
function clearChat(){window.speechSynthesis&&window.speechSynthesis.cancel();state.chat=[];localStorage.removeItem('lm_c3');state.view='home';render();}

// ─── INIT ───
load();
window.speechSynthesis&&window.speechSynthesis.addEventListener('voiceschanged',()=>{});
render();
</script>
